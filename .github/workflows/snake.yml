name: Generate contribution snake

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG from real contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: NureRykushBohdan
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            assets/snake.svg?palette=github-dark&color_snake=38bdf8&color_dots=#161b22,#0e2438,#155e8a,#0ea5e9,#38bdf8

      - name: Commit updated snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/snake.svg
          git diff --staged --quiet || git commit -m "chore: update contribution snake from GitHub data"
          git push
