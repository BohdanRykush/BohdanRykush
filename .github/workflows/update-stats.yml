name: Update README stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=BohdanRykush&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=C9D1D9&text_color=8B949E&icon_color=38BDF8&border_radius=8&rank_icon=percentile&card_width=415&count_private=true
          path: assets/stats.svg
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch streak card
        run: |
          curl -fSL --retry 3 --retry-delay 10 --max-time 180 \
            "https://streak-stats.demolab.com/?user=BohdanRykush&theme=tokyonight&hide_border=true&background=0d1117&stroke=0d1117&ring=38BDF8&fire=38BDF8&currStreakNum=C9D1D9&currStreakLabel=8B949E&sideNums=C9D1D9&sideLabels=8B949E&dates=484F58" \
            -o assets/streak.svg

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/streak.svg
          git diff --staged --quiet || git commit -m "chore: update README stats SVGs"
          git pull --rebase origin main
          git push
